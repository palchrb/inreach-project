<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather Decoder">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Weather Decoder</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #f0f0f0; }
        h1 { color: #333; }
        textarea { width: 90%; max-width: 600px; height: 80px; margin: 5px 0; font-size: 16px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { font-size: 16px; padding: 10px 20px; color: #fff; background-color: #007bff; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; max-width: 600px; border-collapse: collapse; margin: 20px 0; overflow-x: auto; display: block; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        nav { width: 100%; background: #007bff; padding: 10px 0; display: flex; justify-content: center; overflow-x: auto; white-space: nowrap; }
        nav ul { display: flex; gap: 10px; list-style: none; padding: 0; margin: 0; }
        nav ul li a { color: white; text-decoration: none; font-size: 16px; font-weight: bold; padding: 8px 15px; border-radius: 5px; transition: background 0.3s; }
        nav ul li a:hover { background: #0056b3; }
        .history-item { cursor: pointer; padding: 5px 10px; margin: 2px; background: #e9ecef; border-radius: 3px; font-size: 12px; display: inline-block; }
        .history-item:hover { background: #dee2e6; }
        #historyContainer { max-width: 600px; width: 90%; margin: 5px 0; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Weather</a></li>
            <li><a href="avalanche.html">Avalanche</a></li>
            <li><a href="cmd.html">Commands</a></li>
        </ul>
    </nav>
    <h1>Weather Decoder</h1>
    <p>Paste the encoded weather message below:</p>
    <textarea id="encodedMessage" placeholder="Enter the first part of the message..."></textarea>
    <textarea id="encodedMessagePart2" placeholder="Enter the second part (if applicable)..."></textarea>
    <button id="decodeButton">Decode</button>
    <div id="historyContainer"></div>
    <table id="weatherTable">
        <thead>
            <tr><th colspan="6" id="weatherDate">Date: Not set</th></tr>
            <tr><th>Time</th><th>Weather</th><th>Temp</th><th>Precip (mm)</th><th>Wind (Gust) m/s</th><th>Dir</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
