<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Avalanche Decoder</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #f0f0f0; }
        h1 { color: #333; }
        textarea { width: 90%; max-width: 600px; height: 80px; margin: 5px 0; font-size: 16px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { font-size: 16px; padding: 10px 20px; color: #fff; background-color: #007bff; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .vurdering { max-width: 90%; word-wrap: break-word; text-align: left; margin: 10px auto; font-size: 16px; }
        table { width: 100%; max-width: 600px; border-collapse: collapse; margin: 20px 0; overflow-x: auto; display: block; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        nav { width: 100%; background: #007bff; padding: 10px 0; display: flex; justify-content: center; overflow-x: auto; white-space: nowrap; }
        nav ul { display: flex; gap: 10px; list-style: none; padding: 0; margin: 0; }
        nav ul li a { color: white; text-decoration: none; font-size: 16px; font-weight: bold; padding: 8px 15px; border-radius: 5px; transition: background 0.3s; }
        nav ul li a:hover { background: #0056b3; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Weather</a></li>
            <li><a href="avalanche.html">Avalanche</a></li>
            <li><a href="cmd.html">Commands</a></li>
        </ul>
    </nav>
    <h1>Avalanche Decoder</h1>
    <textarea id="encodedAvalancheMessage1" placeholder="Paste the first part of the message..."></textarea>
    <textarea id="encodedAvalancheMessage2" placeholder="Paste the second part (if applicable)..."></textarea>
    <button id="decodeAvalancheButton">Decode</button>
    <p id="dangerLevels">Danger levels: Not set</p>
    <p id="vurdering" class="vurdering">Assessment: Not set</p>
    <table id="avalancheTable">
        <thead>
            <tr>
                <th>Type</th><th>Cause</th><th>Distribution</th><th>Sensitivity</th><th>Size</th><th>Height</th><th>Direction</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="script2.js"></script>
</body>
</html>
